<div class="settings-modal-backdrop" role="presentation" (click)="onBackdropClick($event)">
  <section class="settings-modal" role="dialog" aria-modal="true" [attr.aria-label]="ariaLabel">
    <header class="settings-modal__header">
      <h2>{{ title }}</h2>
      <button type="button" class="settings-modal__close" (click)="requestClose.emit()">Close</button>
    </header>
    <ng-content></ng-content>
  </section>
</div>
