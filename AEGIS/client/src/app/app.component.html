<div class="app-shell">
  <header class="operations-bar" aria-label="Primary navigation">
    <a class="operations-bar__brand" routerLink="/" aria-label="AEGIS workspace">
      <svg class="operations-bar__mark" viewBox="0 0 32 32" aria-hidden="true" focusable="false">
        <path class="crest-outline" d="M16 2.8 27.2 6.9v7.8c0 7.3-4.5 12.4-11.2 14.6C9.3 27.1 4.8 22 4.8 14.7V6.9L16 2.8Z" />
        <path class="crest-field" d="M8.8 9.3 16 6.6l7.2 2.7v4.9c0 5-2.9 8.7-7.2 10.6-4.3-1.9-7.2-5.6-7.2-10.6V9.3Z" />
        <path class="crest-cut" d="M16 8.7 21.1 22h-2.5l-.9-2.6h-3.4l-.9 2.6h-2.5L16 8.7Zm-.9 8.5h1.8L16 13.7l-.9 3.5Z" />
        <path class="crest-signal" d="M10.7 12.7h3.1M18.2 12.7h3.1M12.1 23.2l2.2-3.8M19.9 23.2l-2.2-3.8" />
      </svg>
      <span>AEGIS</span>
    </a>
    <nav class="operations-bar__nav" aria-label="Application sections">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Workspace</a>
      <a routerLink="/capabilities" routerLinkActive="active">Capabilities</a>
      <a routerLink="/access-configurations" routerLinkActive="active">Access</a>
      <a routerLink="/settings" routerLinkActive="active">
        <span class="nav-label nav-label--full">Model Settings</span>
        <span class="nav-label nav-label--compact">Settings</span>
      </a>
    </nav>
    <div class="operations-bar__tools" aria-label="Workspace tools">
      <button type="button" aria-label="Search">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" focusable="false">
          <path d="M10.8 4.2a6.6 6.6 0 1 0 0 13.2 6.6 6.6 0 0 0 0-13.2zm-8.4 6.6a8.4 8.4 0 1 1 15.1 5.1l4 4a.9.9 0 0 1-1.3 1.3l-4-4A8.4 8.4 0 0 1 2.4 10.8z" fill="currentColor" />
        </svg>
      </button>
      <button type="button" aria-label="Notifications">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" focusable="false">
          <path d="M12 3.2a4.7 4.7 0 0 0-4.7 4.7v1.8c0 .8-.2 1.5-.6 2.2L5.1 15h13.8l-1.6-3.1a4.7 4.7 0 0 1-.6-2.2V7.9A4.7 4.7 0 0 0 12 3.2zm0 17.4a2.3 2.3 0 0 1-2.1-1.4h4.2a2.3 2.3 0 0 1-2.1 1.4z" fill="currentColor" />
        </svg>
      </button>
      <span class="operations-bar__user" aria-label="Current user">JS</span>
    </div>
    <div class="operations-bar__status" aria-label="Default data mode">
      <span aria-hidden="true"></span>
      Open data default
    </div>
  </header>
  <main class="app-content" role="main">
    <router-outlet></router-outlet>
  </main>
</div>
