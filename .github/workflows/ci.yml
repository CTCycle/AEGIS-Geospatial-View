name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  python-sanity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Sanity check
        run: python --version

  frontend-regressions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: AEGIS/client/package-lock.json

      - name: Install Python test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Install Playwright browser
        run: python -m playwright install chromium

      - name: Install frontend deps
        working-directory: AEGIS/client
        run: npm ci

      - name: Start frontend
        working-directory: AEGIS/client
        run: npm run preview -- --host 127.0.0.1 --port 7861 > ../../frontend.ci.log 2>&1 &

      - name: Wait for frontend
        run: |
          for i in {1..90}; do
            if curl -fsS http://127.0.0.1:7861 >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat frontend.ci.log
          exit 1

      - name: Run frontend regression suites
        env:
          APP_TEST_FRONTEND_URL: http://127.0.0.1:7861
        run: pytest -q tests/e2e/test_map_render_regressions.py tests/e2e/test_settings_regressions.py --browser chromium
