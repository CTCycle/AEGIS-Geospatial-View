name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  backend-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install backend test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run backend unit suites
        run: |
          python -m pytest tests/unit/services/agent tests/unit/services/geospatial tests/unit/services/search tests/unit/services/vector tests/unit/test_runtime_env_loading.py

  frontend-build-and-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: AEGIS/client/package-lock.json

      - name: Install frontend dependencies
        working-directory: AEGIS/client
        run: npm ci

      - name: Frontend build
        working-directory: AEGIS/client
        run: npm run build

      - name: Frontend unit tests
        working-directory: AEGIS/client
        run: npm run test -- --watch=false --browsers=ChromeHeadless

  capability-contract-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install backend test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Validate manifest completeness
        run: python -m pytest tests/unit/services/vector/test_capability_manifest_completeness.py

      - name: Validate runtime profile completeness
        run: python -m pytest tests/unit/services/geospatial/test_runtime_registry.py::test_runtime_profiles_cover_all_capabilities

      - name: Validate tool binding completeness
        run: python -m pytest tests/unit/services/agent/test_tool_registry.py::test_tool_registry_has_binding_for_all_tool_manifests
