name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  backend-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install backend test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "app/server[test]"

      - name: Run backend unit suites
        run: |
          python -m pytest -c app/server/pyproject.toml app/tests/unit/test_backend_python_compile.py app/tests/unit/services/chat app/tests/unit/services/agent app/tests/unit/services/geospatial app/tests/unit/services/search app/tests/unit/services/vector app/tests/unit/test_runtime_env_loading.py app/tests/unit/test_chat_domain_contract.py

  frontend-build-and-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/client/package-lock.json

      - name: Install frontend dependencies
        working-directory: app/client
        run: npm ci

      - name: Frontend build
        working-directory: app/client
        run: npm run build

      - name: Frontend unit tests
        working-directory: app/client
        run: npm run test -- --watch=false --browsers=ChromeHeadlessNoGpu

      - name: Geospatial E2E scenario catalog
        working-directory: app/client
        run: npm run test:e2e:geospatial

  capability-contract-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install backend test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "app/server[test]"

      - name: Validate manifest completeness
        run: python -m pytest -c app/server/pyproject.toml app/tests/unit/services/vector/test_capability_manifest_completeness.py

      - name: Validate geospatial schema v2 audit
        run: |
          cd app
          python -m server.services.geospatial.layer_auditor --strict

      - name: Run geospatial provider and API contracts
        run: |
          python -m pytest -c app/server/pyproject.toml \
            app/tests/unit/test_manifest_schema_v2.py \
            app/tests/unit/test_geospatial_implementation_completeness.py \
            app/tests/unit/test_geospatial_plan_completion_surface.py \
            app/tests/unit/test_provider_registry.py \
            app/tests/unit/test_phase4_provider_adapters.py \
            app/tests/unit/test_phase8_provider_adapters.py \
            app/tests/unit/test_geospatial_ingestion.py \
            app/tests/unit/test_geospatial_normalizers.py \
            app/tests/unit/test_geospatial_api_contracts.py \
            app/tests/unit/test_gtfs_providers.py \
            app/tests/unit/test_hazard_provider_adapters.py \
            app/tests/unit/test_agentic_geospatial_selection.py \
            app/tests/unit/test_geospatial_e2e_scenarios.py

      - name: Validate runtime profile completeness
        run: python -m pytest -c app/server/pyproject.toml app/tests/unit/services/geospatial/test_runtime_registry.py::test_runtime_profiles_cover_all_capabilities

      - name: Validate tool binding completeness
        run: python -m pytest -c app/server/pyproject.toml app/tests/unit/services/agent/test_tool_registry.py::test_tool_registry_has_binding_for_all_tool_manifests

