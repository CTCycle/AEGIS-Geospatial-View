name: Geospatial Live Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

jobs:
  optional-live-smoke:
    runs-on: ubuntu-latest
    env:
      GEOAPIFY_API_KEY: ${{ secrets.GEOAPIFY_API_KEY }}
      NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
      NREL_API_KEY: ${{ secrets.NREL_API_KEY }}
      OPENCHARGEMAP_API_KEY: ${{ secrets.OPENCHARGEMAP_API_KEY }}
      OPENTRIPMAP_API_KEY: ${{ secrets.OPENTRIPMAP_API_KEY }}
      TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
      WINDY_WEBCAMS_API_KEY: ${{ secrets.WINDY_WEBCAMS_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install backend test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "app/server[test]"

      - name: Validate geospatial manifests
        run: |
          cd app
          python -m server.services.geospatial.layer_auditor --strict

      - name: Run provider contract tests
        run: |
          python -m pytest -c app/server/pyproject.toml \
            app/tests/unit/test_phase4_provider_adapters.py \
            app/tests/unit/test_phase8_provider_adapters.py \
            app/tests/unit/test_geospatial_api_contracts.py
