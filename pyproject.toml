[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "AEGIS"
version = "1.6"
requires-python = ">=3.12,<3.13"

dependencies = [
    "fastapi==0.118.0",
    "nicegui==3.0.4",    
    "numpy==2.3.2",
    "pandas==2.3.3",
    "tqdm==4.67.1",    
    "SQLAlchemy==2.0.43",
    "python-dotenv==1.1.0",    
    "pytest==8.3.3",

]

[tool.hatch.build.targets.wheel]
packages = ["AEGIS"] 

