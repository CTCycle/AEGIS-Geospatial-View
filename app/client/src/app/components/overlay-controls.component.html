<div class="overlay-controls">
  @for (overlay of overlays; track trackOverlay($index, overlay)) {
    <div class="overlay-control-row">
      <label [attr.data-render-status]="getRenderStatus(overlay.id)">
        <input
          type="checkbox"
          [checked]="overlayVisibility[overlay.id]"
          (change)="onOverlayVisibilityChange(overlay.id, $event)"
        />
        {{ overlay.label }}
      </label>
      <input
        #opacityInput
        type="range"
        min="0"
        max="100"
        [value]="getOpacityPercent(overlay)"
        [disabled]="isOpacityDisabled(overlay.id)"
        (input)="onOpacityChange(overlay.id, opacityInput.value)"
      />
      @if (getRenderStatus(overlay.id) !== 'loaded') {
        <p class="overlay-render-note">
          {{ getRenderStatus(overlay.id) }}
          @if (getRenderMessage(overlay.id)) {
            : {{ getRenderMessage(overlay.id) }}
          }
        </p>
      }
    </div>
  }
</div>
