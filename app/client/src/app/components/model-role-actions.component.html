<div class="model-card__actions">
  @for (role of roles; track role) {
    <button
      type="button"
      class="model-card__duty"
      [class.model-card__duty--active]="isSelected(role)"
      [class.model-card__duty--disabled]="isDisabled(role)"
      [disabled]="isDisabled(role)"
      [attr.title]="roleTitle(role)"
      [attr.aria-label]="roleTitle(role)"
      (click)="onSelect(role)"
    >
      <span class="model-card__duty-icon" aria-hidden="true">
        @if (roleIcon(role) === 'parser') {
          <svg viewBox="0 0 24 24" width="18" height="18" focusable="false">
            <path d="M8.5 5 4 12l4.5 7M15.5 5 20 12l-4.5 7M13 4l-2 16" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        } @else if (roleIcon(role) === 'chat') {
          <svg viewBox="0 0 24 24" width="18" height="18" focusable="false">
            <path d="M5 6.5a3.5 3.5 0 0 1 3.5-3.5h7A3.5 3.5 0 0 1 19 6.5v6A3.5 3.5 0 0 1 15.5 16H11l-4 3v-3.2A3.5 3.5 0 0 1 5 12.5z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="10" cy="9.5" r="1" fill="currentColor"/>
            <circle cx="13.5" cy="9.5" r="1" fill="currentColor"/>
          </svg>
        } @else {
          <svg viewBox="0 0 24 24" width="18" height="18" focusable="false">
            <circle cx="12" cy="8" r="3.2" fill="none" stroke="currentColor" stroke-width="1.8"/>
            <path d="M5 19.2c1.5-3.2 3.9-4.8 7-4.8s5.5 1.6 7 4.8" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        }
      </span>
      <span class="model-card__duty-name">{{ roleName(role) }}</span>
    </button>
  }
</div>
