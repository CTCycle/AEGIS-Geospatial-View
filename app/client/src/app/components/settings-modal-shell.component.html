<div class="settings-modal-backdrop" role="presentation" (click)="onBackdropClick($event)">
  <section class="settings-modal" [class]="panelClass ? 'settings-modal ' + panelClass : 'settings-modal'" role="dialog" aria-modal="true" [attr.aria-label]="ariaLabel">
    @if (showHeader) {
      <header class="settings-modal__header">
        <h2>{{ title }}</h2>
        <button type="button" class="settings-modal__close" aria-label="Close" (click)="requestClose.emit()">
          <span aria-hidden="true">&times;</span>
          <span class="sr-only">Close</span>
        </button>
      </header>
    }
    <ng-content></ng-content>
  </section>
</div>
